<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ParkShare My Bookings</title>
    <meta name="description" content="View your pending and confirmed ParkShare bookings." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1" aria-hidden="true"></div>
    <div class="bg-orb orb-2" aria-hidden="true"></div>

    <main class="booking-main">
      <section class="booking-card" aria-labelledby="myBookingsTitle">
        <a class="brand" href="index.html" aria-label="ParkShare Home">
          <span class="brand-mark">P</span>
          <span class="brand-text">ParkShare</span>
        </a>

        <p class="eyebrow">MY BOOKINGS</p>
        <h1 id="myBookingsTitle">Your reservations</h1>
        <p class="hero-copy">Track booking statuses while waiting for approval and after confirmation.</p>

        <div class="my-bookings-sections">
          <section>
            <h2>Pending approval</h2>
            <div id="pendingBookingsList" class="my-bookings-list"></div>
          </section>
          <section>
            <h2>Confirmed</h2>
            <div id="confirmedBookingsList" class="my-bookings-list"></div>
          </section>
        </div>

        <div class="booking-actions">
          <a class="btn btn-outline" href="index.html">Back to home</a>
        </div>

        <p id="myBookingsText" aria-live="polite"></p>
      </section>
    </main>

    <script src="my-bookings.js"></script>
  </body>
</html>
