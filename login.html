<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ParkShare Login</title>
    <meta name="description" content="Login to your ParkShare account to reserve parking spots." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1" aria-hidden="true"></div>
    <div class="bg-orb orb-2" aria-hidden="true"></div>

    <main class="auth-page-main" id="top">
      <section class="auth-page-card" aria-labelledby="authPageTitle">
        <a class="brand" href="index.html" aria-label="ParkShare Home">
          <span class="brand-mark">P</span>
          <span class="brand-text">ParkShare</span>
        </a>

        <p class="eyebrow">WELCOME BACK</p>
        <h1 id="authPageTitle">Sign in to reserve your next parking spot</h1>
        <p class="hero-copy">
          Login to continue booking trusted spaces around Davao.
        </p>

        <form id="loginPageForm" class="auth-page-form" novalidate>
          <div class="field">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" name="email" type="email" autocomplete="email" required />
          </div>
          <div class="field">
            <label for="loginPassword">Password</label>
            <input
              id="loginPassword"
              name="password"
              type="password"
              autocomplete="current-password"
              minlength="6"
              required
            />
          </div>
          <button class="btn btn-solid" type="submit">Log in</button>
        </form>

        <div class="auth-page-actions">
          <a class="btn btn-solid" href="signup.html">Need an account? Sign up</a>
          <a class="btn btn-outline" href="index.html">Back to home</a>
          <button id="logoutPageBtn" class="btn btn-outline" type="button">Log out</button>
        </div>

        <p id="loginPageText" aria-live="polite"></p>
      </section>
    </main>

    <script src="login.js"></script>
  </body>
</html>
